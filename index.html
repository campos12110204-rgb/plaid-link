<!DOCTYPE html>
<html>
<head>
  <title>Plaid Link</title>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    #status { margin-top: 20px; font-size: 16px; }
    button { padding: 12px 24px; font-size: 16px; }
  </style>
</head>
<body>

  <h2>Connect your bank</h2>
  <button id="connectBtn">Connect Bank</button>
  <div id="status">Bank not connected yet</div>

<script>
const BACKEND_URL = "https://plaid-backend-8vsj.onrender.com";

// Get user_id from URL parameters
const params = new URLSearchParams(window.location.search);
const user_id = params.get("user_id") || "unknown";

const statusDiv = document.getElementById("status");

document.getElementById('connectBtn').addEventListener('click', () => {
  statusDiv.innerText = "Fetching link token…";

  fetch(`${BACKEND_URL}/create_link_token`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id })
  })
  .then(res => res.json())
  .then(data => {
    if (!data.link_token) {
      console.error("No link token returned:", data);
      statusDiv.innerText = "Failed to fetch link token";
      return;
    }

    statusDiv.innerText = "Opening Plaid…";

    const handler = Plaid.create({
      token: data.link_token,

      onSuccess: function(public_token) {
        statusDiv.innerText = "Bank connected! Saving…";

        // Exchange public_token with backend
        fetch(`${BACKEND_URL}/exchange_public_token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ public_token, user_id })
        })
        .then(res => res.json())
        .then(() => {
          statusDiv.innerHTML = "✅ Bank connected successfully!<br>You may now return to the app.";
          console.log("Exchange successful");
        })
        .catch(err => {
          console.error("Failed to exchange token:", err);
          statusDiv.innerText = "Failed to connect bank";
        });
      },

      onExit: function(err, metadata) {
        console.log("User exited Plaid Link", err, metadata);
        statusDiv.innerText = "Plaid exited. Bank not connected.";
      }
    });

    handler.open();
  })
  .catch(err => {
    console.error("Failed to fetch link token:", err);
    statusDiv.innerText = "Failed to fetch link token";
  });

});
</script>
</body>
</html>
